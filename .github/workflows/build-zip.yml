name: Build Extension ZIP

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Eliminar ZIP anterior si existe
        run: |
          if ls sales-copilot-*.zip 1>/dev/null 2>&1; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm -f sales-copilot-*.zip || true
            echo "ZIP anterior eliminado"
          else
            echo "No había ZIP anterior"
          fi

      - name: Obtener versión del manifest
        id: version
        run: |
          VERSION=$(cat manifest.json | python3 -c "import sys,json; print(json.load(sys.stdin)['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Versión: $VERSION"

      - name: Crear ZIP de la extensión
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ZIP_NAME="sales-copilot-v${VERSION}.zip"
          zip -r "$ZIP_NAME" \
            manifest.json \
            icons/ \
            src/ \
            README.md \
            --exclude "*.DS_Store" \
            --exclude "*/.git/*"
          echo "ZIP creado: $ZIP_NAME"
          ls -lh "$ZIP_NAME"

      - name: Commit y push del ZIP
        run: |
          VERSION=${{ steps.version.outputs.version }}
          ZIP_NAME="sales-copilot-v${VERSION}.zip"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$ZIP_NAME"
          git commit -m "build: ZIP v${VERSION} generado automáticamente [skip ci]"
          git push
